# electron-builder packaging config. macOS notarization is handled by
# electron-builder when the Apple API key env vars are present.
appId: com.tmuxide.app
productName: tmux-ide
directories:
  output: release
  buildResources: resources

# Files relative to this package — dist-electron is the bundled main +
# preload + loader. The dashboard's static export and node-pty are
# brought in via `extraResources` and `asarUnpack` respectively (they
# live outside this package's tree).
files:
  - dist-electron/**/*
  - package.json
  - "!**/*.{ts,tsx,map}"
  - "!**/__tests__/**"
  - "!**/*.test.*"
  # pnpm workspace symlinks pull in sibling-package files that resolve
  # outside this package's tree. tsdown bundles everything except the
  # native modules listed in `asarUnpack` below, so we can safely drop
  # all workspace packages from the asar.
  - "!**/.turbo/**"
  - "!**/*.tsbuildinfo"
  - "!**/.next/cache/**"
  - "!**/node_modules/@tmux-ide/**"
  - "!**/node_modules/.pnpm/@tmux-ide+**"

# `extraResources` lands files under `Contents/Resources/<to>` in the
# bundled .app — outside the asar archive. main.ts resolves the
# dashboard path via `process.resourcesPath` in packaged mode.
extraResources:
  - from: "../dashboard/out"
    to: "dashboard-out"
    filter:
      - "**/*"

asar: true
# node-pty must remain unpacked (it loads a native .node file at
# runtime that can't live inside the asar archive).
asarUnpack:
  - "**/node_modules/node-pty/**"

mac:
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  artifactName: "tmux-ide-${version}-${arch}.${ext}"
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64

linux:
  icon: resources/icon.png
  target:
    - AppImage
  category: Development

win:
  icon: resources/icon.png
  target:
    - nsis

publish:
  provider: github
  owner: wavyrai
  repo: tmux-ide
  # Pre-1.0 builds are intentionally published as GitHub prereleases.
  # Switch to `release` for v1.0.0 and later.
  releaseType: prerelease
