name: project-name

team:
  name: missions

rows:
  - size: 70%
    panes:
      - title: Lead
        command: claude
        role: lead
        focus: true
        inbox: true
        task: >-
          You are the team lead. Your pane is inbox-mode: messages to you are
          queued as envelopes, never pasted into your composer. At session
          start, launch 'tmux-ide inbox watch Lead' as a background Bash task.
          When it exits with message ids, run 'tmux-ide recv <id>' for each,
          handle the message, then relaunch the watcher — catch-up at watch
          start covers anything that arrived in between.
      - title: Frontend
        command: claude
        role: teammate
        specialty: frontend
      - title: Backend
        command: claude
        role: teammate
        specialty: backend

  - size: 30%
    panes:
      - title: Validator
        command: claude
        role: validator
        skill: reviewer
      - title: Researcher
        command: claude
        role: researcher
        specialty: researcher
        skill: researcher
      - title: Shell

orchestrator:
  enabled: true
  auto_dispatch: true
  dispatch_mode: missions
  poll_interval: 5000
  stall_timeout: 300000
  master_pane: Lead
