name: my-app

team:
  name: my-app

before: pnpm install

rows:
  - size: 70%
    panes:
      - title: Lead
        command: claude
        role: lead
        focus: true
        inbox: true
        task: >-
          You are the team lead. Your pane is inbox-mode: messages to you are
          queued as envelopes, never pasted into your composer. At session
          start, launch 'tmux-ide inbox watch Lead' as a background Bash task.
          When it exits with message ids, run 'tmux-ide recv <id>' for each,
          handle the message, then relaunch the watcher — catch-up at watch
          start covers anything that arrived in between.
      - title: Frontend
        command: claude
        role: teammate
        task: "Work on React components and pages"
      - title: Backend
        command: claude
        role: teammate
        task: "Work on API routes and server logic"

  - panes:
      - title: Next.js
        command: pnpm dev
      - title: Shell
