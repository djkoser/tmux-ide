name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  cli:
    name: CLI checks (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint:workspace

      - name: Format check
        run: pnpm run format:check

      - name: Build
        run: pnpm build

      # Tests require Bun runtime; exclude integration tests (need tmux)
      - name: Run test suite
        if: matrix.node >= 22
        run: |
          mv src/integration.test.ts src/integration.test.ts.skip 2>/dev/null || true
          pnpm test:unit

      - name: Smoke test (Node < 22 — verify package contents)
        if: matrix.node < 22
        run: pnpm pack:check

      - name: Validate package contents
        run: pnpm pack:check

  dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI (dashboard may depend on dist/)
        run: pnpm build

      - name: Build dashboard
        working-directory: dashboard
        run: npx next build

      - name: Run dashboard tests
        run: cd dashboard && pnpm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
      NEXT_PUBLIC_TMUX_IDE_SERVER_PORT: "6070"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI (bin/cli.js imports from dist/)
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E suite
        # playwright.config.ts boots its own webServer (daemon + dashboard dev).
        # smoke.spec.ts is excluded via testIgnore — smoke.yml owns it.
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build
