name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-15
            arch: arm64
            platform: mac
          - label: macOS x64
            runner: macos-15
            arch: x64
            platform: mac
          - label: Linux x64
            runner: ubuntu-24.04
            arch: x64
            platform: linux
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            raw="${{ github.event.inputs.version }}"
          else
            raw="${GITHUB_REF_NAME}"
          fi

          version="${raw#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Align Electron package version
        run: |
          node -e "const fs=require('node:fs'); const p='app-electron/package.json'; const pkg=JSON.parse(fs.readFileSync(p,'utf8')); pkg.version=process.argv[1]; fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');" "${{ steps.release.outputs.version }}"

      - name: Build dashboard (static export)
        run: pnpm --filter @tmux-ide/dashboard build

      - name: Build electron bundle
        run: pnpm --filter @tmux-ide/app-electron build

      - name: Package + sign + notarize (macOS)
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/apple-api-key.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        shell: bash
        run: |
          printf '%s' '${{ secrets.APPLE_API_KEY_BASE64 }}' | base64 -d > "$APPLE_API_KEY"
          pnpm --filter @tmux-ide/app-electron exec electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: pnpm --filter @tmux-ide/app-electron exec electron-builder --linux --${{ matrix.arch }} --publish never

      - name: Rename mac manifest per arch
        if: runner.os == 'macOS'
        env:
          ARCH: ${{ matrix.arch }}
          RELEASE_DATE: ${{ github.run_started_at }}
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const yaml = require("js-yaml");
          const source = "app-electron/release/latest-mac.yml";
          const target = `app-electron/release/latest-mac-${process.env.ARCH}.yml`;
          const manifest = yaml.load(fs.readFileSync(source, "utf8"));
          manifest.releaseDate = process.env.RELEASE_DATE;
          fs.writeFileSync(target, yaml.dump(manifest, { lineWidth: -1 }));
          fs.unlinkSync(source);
          NODE

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}-${{ matrix.arch }}
          path: app-electron/release/
          if-no-files-found: error

  merge_manifests:
    name: Merge updater manifests
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-mac-arm64
          path: release-assets

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-mac-x64
          path: release-assets

      - name: Merge mac latest.yml
        run: |
          node scripts/merge-update-manifests.mjs \
            release-assets/latest-mac-arm64.yml \
            release-assets/latest-mac-x64.yml \
            release-assets/latest-mac.yml
          rm release-assets/latest-mac-arm64.yml release-assets/latest-mac-x64.yml

      - name: Validate merged manifest
        run: |
          node -e "
          const m = require('js-yaml').load(require('fs').readFileSync('release-assets/latest-mac.yml', 'utf-8'));
          if (!m.files || m.files.length < 2) { console.error('Expected at least 2 files in merged manifest'); process.exit(1); }
          console.log('Merged manifest has ' + m.files.length + ' files for v' + m.version);
          "

      - name: Upload merged manifest
        uses: actions/upload-artifact@v4
        with:
          name: dist-merged-mac-manifest
          path: release-assets/latest-mac.yml
          if-no-files-found: error

  publish_desktop:
    name: Publish desktop release
    needs: [build, merge_manifests]
    runs-on: ubuntu-24.04
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: release-assets

      - name: Keep only canonical mac manifest
        run: rm -f release-assets/latest-mac-arm64.yml release-assets/latest-mac-x64.yml

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          draft: true
          prerelease: true
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.blockmap
            release-assets/*.yml

  publish_npm:
    name: Publish to npm
    if: github.event_name == 'push'
    needs: [build, merge_manifests]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Resolve package version
        id: release
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Align npm package versions
        run: |
          node -e "const fs=require('node:fs'); for (const p of ['package.json','packages/daemon/package.json']) { const pkg=JSON.parse(fs.readFileSync(p,'utf8')); pkg.version=process.argv[1]; fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n'); }" "${{ steps.release.outputs.version }}"

      - name: Build dashboard
        run: pnpm --filter @tmux-ide/dashboard build

      - name: Publish @tmux-ide/daemon
        run: pnpm --filter @tmux-ide/daemon publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish tmux-ide
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
